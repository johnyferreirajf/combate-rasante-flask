{% extends "layout.html" %}
{% block title %}Painel do Cliente — COMBATE RASANTE{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<style>
    /* Garante que os tiros comecem invisíveis */
    .tiro-polygon { opacity: 0; fill-opacity: 0; transition: all 0.3s ease; }
</style>
{% endblock %}

{% block content %}
<section class="dashboard-section section">
    <div class="container">
        <div id="map" style="height: 500px;"></div>
    </div>
</section>

<script>
    // Lógica de animação ajustada
    function tick() {
        if (!_playing || _step >= _total) return;

        let s = _steps[_step];
        if (s && _plane) {
            _plane.setLatLng([s.pos[0], s.pos[1]]);
            
            // Lógica de pintura: Se está dentro da área do tiro (s.in)
            if (s.in && s.ti >= 0 && _polys[s.ti]) {
                _doneCnt[s.ti]++;
                let pct = Math.min(1, _doneCnt[s.ti] / _inCnt[s.ti]);
                _polys[s.ti].setStyle({
                    fillOpacity: 0.2 + (pct * 0.4),
                    opacity: 1,
                    color: '#22c55e'
                });
            }
        }
        
        _step++;
        updateUI(); // Função que atualiza barra e texto
        _timer = setTimeout(tick, 50);
    }
</script>
{% endblock %}
