{% extends "layout.html" %}
{% block title %}Trocar Senha — COMBATE RASANTE{% endblock %}

{% block content %}
<section class="auth-section section">
  <div class="container">

    {# ── Navegação ── #}
    <div style="display:flex; gap:10px; margin-bottom: var(--space-lg); flex-wrap:wrap;">
      <a href="{{ url_for('auth.admin') }}" class="btn btn--ghost">👤 Clientes</a>
      <a href="{{ url_for('auth.admin_funcionarios') }}" class="btn btn--ghost">👷 Funcionários</a>
      <a href="{{ url_for('auth.admin_uploads') }}" class="btn btn--ghost">📁 Análises</a>
      <a href="{{ url_for('auth.admin_mensagens') }}" class="btn btn--ghost">✉ Mensagens</a>
      <a href="{{ url_for('auth.trocar_senha') }}" class="btn btn--primary">🔑 Trocar Senha</a>
    </div>

    <div style="max-width: 480px; margin-inline: auto;">
      <div class="auth-card">
        <h1 class="auth-card__title">Trocar Senha</h1>
        <p class="auth-card__desc">
          Logado como: <strong>{{ current_user.email }}</strong>
        </p>

        <form method="POST" novalidate>

          <div class="form-group">
            <label class="form-label" for="senha_atual">Senha atual</label>
            <input
              id="senha_atual"
              name="senha_atual"
              type="password"
              class="form-control"
              placeholder="Digite a senha atual"
              required
              autocomplete="current-password"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="nova_senha">Nova senha</label>
            <input
              id="nova_senha"
              name="nova_senha"
              type="password"
              class="form-control"
              placeholder="Mínimo 6 caracteres"
              minlength="6"
              required
              autocomplete="new-password"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmar">Confirmar nova senha</label>
            <input
              id="confirmar"
              name="confirmar"
              type="password"
              class="form-control"
              placeholder="Repita a nova senha"
              minlength="6"
              required
              autocomplete="new-password"
            >
          </div>

          <div class="mt-lg">
            <button type="submit" class="btn btn--primary btn--full">
              Salvar nova senha
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</section>
{% endblock %}
