{% extends "layout.html" %}
{% block title %}COMBATE RASANTE - Área de Funcionários{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/employee_portal.css') }}">

<div class="sp-page">
    <div class="sp-wrap">
        <div id="map"></div>
    </div>
</div>

<script>
    // Inicialização dos polígonos:
    _tiros.forEach((t, i) => {
        _polys[i] = L.polygon(t.polygon, {
            color: '#ff0000',
            opacity: 0,       // Começa invisível
            fillOpacity: 0    // Começa invisível
        }).addTo(map);
    });

    function tick() {
        if (!_playing || _step >= _total) return;

        let s = _steps[_step];
        if (s && _plane) {
            _plane.setLatLng([s.pos[0], s.pos[1]]);
            
            // Só pinta se o avião estiver "dentro" do tiro (s.in)
            if (s.in && s.ti !== undefined && _polys[s.ti]) {
                _doneCnt[s.ti]++;
                let pct = Math.min(1, _doneCnt[s.ti] / (_inCnt[s.ti] || 1));
                
                // Aplica a cor de "aplicado" gradualmente
                _polys[s.ti].setStyle({
                    fillOpacity: 0.3,
                    opacity: 1,
                    color: '#32cd32' // Verde quando aplica
                });
            }
        }
        
        _step++;
        // Atualiza a barra de progresso
        let pct = (_step / _total) * 100;
        document.getElementById('am-bar').style.width = pct + '%';
        _timer = setTimeout(tick, 30);
    }
</script>
{% endblock %}
