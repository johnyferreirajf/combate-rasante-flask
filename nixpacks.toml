[phases.setup]
nixPkgs = ["python3", "postgresql_16.dev", "gcc", "chromium", "nss", "nspr", "at-spi2-atk", "libdrm", "libxkbcommon", "mesa", "alsa-lib", "gtk3", "glib", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && playwright install chromium"
]

[start]
cmd = "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
